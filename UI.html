<!DOCTYPE html>
<html>
<head>
  <title>Operator Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
  <header class="dashboard-header">
    <div class="operator-input">
      <label for="operatorName">Operator:</label>
      <input type="text" id="operatorName" placeholder="Enter Name...">
      <button id="saveOperator">Save</button>
    </div>
    <h1>Operator Dashboard</h1>
  </header>
 
  <div class="container">
   
    <div class="live-image">
        <video id="webcam" autoplay playsinline width="640" height="480"></video>
        <button id="snap">Take Snapshot</button>
    </div>
  
    <div class="snapshot-section">
        <canvas id="canvas" width="640" height="480"></canvas>
        <div class="actions">
            <button id="acceptBtn">Pass</button>
            <button id="rejectBtn">Fail</button>
        </div>
    </div>
  
    <div class="confidence-table">
      <h3>Confidence</h3>
      <div id="confidenceValue">--%</div>
    </div>
  
  </div>
    <script>
      const video = document.getElementById('webcam');

          async function startWebcam() {
              try {
                  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                  video.srcObject = stream;
              } catch (error) {
                  console.error("Error accessing webcam:", error);
              }
          }
 
          startWebcam();

          const canvas = document.querySelector("#canvas");
          const snap = document.querySelector("#snap");
          const context = canvas.getContext("2d");

        // Trigger photo capture on button click
        snap.addEventListener("click", () => {
            // This draws the current video frame onto the canvas
            context.drawImage(video, 0, 0, 640, 480);
            snapshot();
        });

    </script>
  
  <div id="logContainer">
    <h3>System Status Log</h3>
    <ul id="log"></ul>
  </div>

<script src="script.js"></script>
</body>
</html>
